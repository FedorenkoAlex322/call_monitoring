services:
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: realtime_asterisk_app
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    depends_on:
      pgsql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - realtime_asterisk
    restart: unless-stopped

  nginx:
    image: nginx:1.25-alpine
    container_name: realtime_asterisk_nginx
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - realtime_asterisk
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/up || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  pgsql:
    image: postgres:16-alpine
    container_name: realtime_asterisk_pgsql
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: realtime_asterisk
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
    volumes:
      - pgsql_data:/var/lib/postgresql/data
    networks:
      - realtime_asterisk
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d realtime_asterisk"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: realtime_asterisk_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - realtime_asterisk
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  worker:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: realtime_asterisk_worker
    working_dir: /var/www/html
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    volumes:
      - .:/var/www/html
    depends_on:
      pgsql:
        condition: service_healthy
      redis:
        condition: service_healthy
      soketi:
        condition: service_healthy
    networks:
      - realtime_asterisk
    restart: unless-stopped

  soketi:
    image: quay.io/soketi/soketi:1.6-16-alpine
    container_name: realtime_asterisk_soketi
    ports:
      - "6001:6001"
      - "9601:9601"
    environment:
      SOKETI_DEFAULT_APP_ID: realtime-asterisk
      SOKETI_DEFAULT_APP_KEY: app-key
      SOKETI_DEFAULT_APP_SECRET: app-secret
      SOKETI_DEBUG: "1"
    networks:
      - realtime_asterisk
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6001/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  pgsql_data:
    driver: local
  redis_data:
    driver: local

networks:
  realtime_asterisk:
    driver: bridge
